<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Claude</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a1a; color: #f5f4ee; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #2d2c2a; padding: 40px; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; }
        h1 { margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #3a3836; border-radius: 8px; background: #30302e; color: #f5f4ee; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 20px; background: #d97757; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        button:hover { background: #c46847; }
        .error { color: #ef4444; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Claude 登录</h1>
        <form id="loginForm">
            <input type="text" id="username" placeholder="用户名" required>
            <input type="password" id="password" placeholder="密码" required>
            <button type="submit">登录</button>
        </form>
        <div id="error" class="error"></div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: username, password })
                });
                const data = await res.json();
                if (data.code === 0 && data.data) {
                    localStorage.setItem('claude_user', JSON.stringify({ email: username }));
                    localStorage.setItem('claude_auth_token', data.data.access_token);
                    window.location.href = '/';
                } else {
                    document.getElementById('error').textContent = data.message || '登录失败';
                }
            } catch (err) {
                document.getElementById('error').textContent = '请求失败';
            }
        });
    </script>
</body>
</html>
